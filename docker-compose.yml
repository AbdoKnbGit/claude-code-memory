services:
  cc-nim-memory:
    build:
      context: .
      network: host
    image: cc-nim-memory:latest
    container_name: cc-nim-memory
    ports:
      - "${PROXY_PORT:-8082}:8082"
      - "${MCP_HTTP_PORT:-8083}:8083"
    command: >
      sh -c "uvicorn server:app --host 0.0.0.0 --port 8082 &
             python mcp_server.py --http --port 8083"
    env_file:
      - .env
    environment:
      - MEMORY_ENABLED=true
      - MEMORY_DB_PATH=/app/data/memory.db
      - MEMORY_CHROMA_PATH=/app/data/chroma
      - BACKUP_ENABLED=true
      - BACKUP_KEEP_DAYS=7
    volumes:
      - cc_memory_data:/app/data
      - memory_backup:/app/data/backups
      - cc_model_cache:/root/.cache/cc-memory
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cc_memory_data:
  memory_backup:
  cc_model_cache:
